version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fosl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fosl_dev
    volumes:
      - fosl_pg_data:/var/lib/postgresql/data

volumes:
  fosl_pg_data:
